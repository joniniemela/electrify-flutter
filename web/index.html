<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="electrify_flutter">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>electrify_flutter</title>
  <link rel="manifest" href="manifest.json">

  <!-- Google Maps JavaScript API loader.
       env.js (gitignored) sets window.MAPS_API_KEY; the inline loader below
       injects the Maps API <script> tag before flutter_bootstrap.js starts,
       so google.maps.* is available by the time the GoogleMap widget mounts. -->
  <script src="env.js"></script>
  <script>
    (function () {
      var key = window.MAPS_API_KEY;
      if (key && key !== "YOUR_WEB_KEY_HERE") {
        var s = document.createElement("script");
        s.src =
          "https://maps.googleapis.com/maps/api/js?key=" +
          encodeURIComponent(key);
        s.async = false;
        document.head.appendChild(s);
      } else {
        console.warn(
          "MAPS_API_KEY missing in web/env.js — Google Maps will not render on web."
        );
      }
    })();
  </script>
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
